<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>노진규 고객관리 시스템 | Mercedes-Benz</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ── 관심차종 2단계 선택 추가 스타일 ── */
    .model-select-wrap {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .model-select-wrap select,
    .model-select-wrap input {
      width: 100%;
    }
    .model-select-wrap select:disabled {
      background-color: #f5f5f5;
      color: #bbb;
      cursor: not-allowed;
      border-color: #e8e8e8;
    }
    .model-custom-input {
      grid-column: 1 / -1;
    }
    @media (max-width: 520px) {
      .model-select-wrap {
        grid-template-columns: 1fr;
      }
      .model-custom-input {
        grid-column: 1;
      }
    }
  </style>
</head>
<body>

  <!-- ===== 헤더 ===== -->
  <header class="site-header">
    <div class="header-inner">
      <div class="logo-wrap">
        <svg class="mb-star" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg" aria-label="Mercedes-Benz star">
          <circle cx="30" cy="30" r="28" fill="none" stroke="currentColor" stroke-width="1.5"/>
          <line x1="30" y1="2"  x2="30" y2="30" stroke="currentColor" stroke-width="1.5"/>
          <line x1="30" y1="30" x2="54.6" y2="44" stroke="currentColor" stroke-width="1.5"/>
          <line x1="30" y1="30" x2="5.4"  y2="44" stroke="currentColor" stroke-width="1.5"/>
        </svg>
        <div class="header-text">
          <span class="site-title">노진규 고객관리 시스템</span>
          <span class="site-sub">고객과의 관계는 출고 이후부터 시작됩니다.</span>
        </div>
      </div>
      <nav class="top-nav">
        <button class="nav-btn active" data-view="dashboard" onclick="showView('dashboard')">대시보드</button>
        <button class="nav-btn" data-view="register" onclick="showView('register')">고객등록</button>
        <button class="nav-btn" data-view="list" onclick="showView('list')">고객목록</button>
      </nav>
    </div>
  </header>

  <!-- ===== 메인 컨텐츠 ===== -->
  <main class="main-wrap">

    <!-- ============================
         뷰 1: 대시보드
    ============================= -->
    <section id="view-dashboard" class="view active">

      <div class="section-label">오늘 연락 예정</div>
      <div id="today-contacts" class="today-section">
        <p class="empty-msg" id="today-empty">오늘 연락 예정 고객이 없습니다.</p>
      </div>

      <div class="section-label mt">현황 요약</div>
      <div class="stat-grid">
        <div class="stat-card">
          <span class="stat-num" id="stat-total">0</span>
          <span class="stat-label">전체 고객</span>
        </div>
        <div class="stat-card accent">
          <span class="stat-num" id="stat-hot">0</span>
          <span class="stat-label">계약유력</span>
        </div>
        <div class="stat-card">
          <span class="stat-num" id="stat-today">0</span>
          <span class="stat-label">오늘 연락</span>
        </div>
        <div class="stat-card">
          <span class="stat-num" id="stat-done">0</span>
          <span class="stat-label">출고완료</span>
        </div>
      </div>

      <div class="section-label mt">최근 등록 고객</div>
      <div id="recent-list" class="card-grid">
        <p class="empty-msg">등록된 고객이 없습니다.</p>
      </div>

    </section>

    <!-- ============================
         뷰 2: 고객 등록 폼
    ============================= -->
    <section id="view-register" class="view">
      <div class="form-header">
        <h2 class="form-title">신규 고객 등록</h2>
        <p class="form-desc">입력 후 저장하면 자동으로 구글시트에 기록됩니다.</p>
      </div>

      <form id="customer-form" class="crm-form" onsubmit="handleFormSubmit(event)">

        <!-- 고객명 -->
        <div class="form-group">
          <label for="f-name">고객명 <span class="req">*</span></label>
          <input type="text" id="f-name" placeholder="홍길동" required />
        </div>

        <!-- 연락처 -->
        <div class="form-group">
          <label for="f-phone">연락처 <span class="req">*</span></label>
          <input type="tel" id="f-phone" placeholder="010-0000-0000" required />
        </div>

        <!-- 거주지역 -->
        <div class="form-group">
          <label for="f-region">거주지역</label>
          <input type="text" id="f-region" placeholder="서울 강남구" />
        </div>

        <!-- 관심차종 (2단계) -->
        <div class="form-group full">
          <label>관심차종</label>
          <div class="model-select-wrap">
            <!-- 1단계: 대분류 -->
            <select id="f-model-category" onchange="onModelCategoryChange()">
              <option value="">대분류 선택</option>
              <option value="E-Class">E-Class</option>
              <option value="S-Class">S-Class</option>
              <option value="C-Class">C-Class</option>
              <option value="GLC">GLC</option>
              <option value="GLE">GLE</option>
              <option value="GLS">GLS</option>
              <option value="CLA">CLA</option>
              <option value="A-Class">A-Class</option>
              <option value="EQ">EQ (전기)</option>
              <option value="기타">기타</option>
            </select>
            <!-- 2단계: 세부모델 (대분류 선택 전 비활성) -->
            <select id="f-model-detail" disabled onchange="onModelDetailChange()">
              <option value="">세부모델 선택</option>
            </select>
            <!-- 기타 / 직접입력 시 표시 -->
            <input
              type="text"
              id="f-model-custom"
              class="model-custom-input hidden"
              placeholder="차종을 직접 입력하세요"
            />
          </div>
        </div>

        <!-- 구매예산 -->
        <div class="form-group">
          <label for="f-budget">구매예산</label>
          <input type="text" id="f-budget" placeholder="예: 8,000만원 ~ 1억" />
        </div>

        <!-- 구매예정시기 -->
        <div class="form-group">
          <label for="f-timing">구매예정시기</label>
          <input type="text" id="f-timing" placeholder="예: 2025년 3분기" />
        </div>

        <!-- 유입경로 -->
        <div class="form-group">
          <label for="f-source">유입경로</label>
          <select id="f-source">
            <option value="">선택하세요</option>
            <option value="지인소개">지인소개</option>
            <option value="기존고객재구매">기존고객 재구매</option>
            <option value="SNS">SNS</option>
            <option value="GETCHA">GETCHA</option>
            <option value="홈페이지">홈페이지</option>
            <option value="전시장방문">전시장 직접방문</option>
            <option value="이벤트">이벤트/프로모션</option>
            <option value="기타">기타</option>
          </select>
        </div>

        <!-- 현재상태 -->
        <div class="form-group">
          <label for="f-status">현재상태 <span class="req">*</span></label>
          <select id="f-status" required>
            <option value="">선택하세요</option>
            <option value="신규문의">신규문의</option>
            <option value="상담중">상담중</option>
            <option value="계약유력">계약유력</option>
            <option value="보류">보류</option>
            <option value="타딜러구매">타딜러구매</option>
            <option value="타브랜드구매">타브랜드구매</option>
            <option value="해약">해약</option>
            <option value="출고완료">출고완료</option>
          </select>
        </div>

        <!-- 상담내용 -->
        <div class="form-group full">
          <label for="f-memo">상담내용</label>
          <textarea id="f-memo" rows="4" placeholder="상담 내용, 특이사항, 고객 선호도 등을 기록하세요."></textarea>
        </div>

        <!-- 다음 연락일 -->
        <div class="form-group">
          <label for="f-nextdate">다음 연락일</label>
          <input type="date" id="f-nextdate" />
        </div>

        <!-- 버튼 -->
        <div class="form-actions full">
          <button type="submit" class="btn-primary" id="submit-btn">
            <span id="submit-text">저장하기</span>
            <span id="submit-loading" class="hidden">저장 중...</span>
          </button>
          <button type="button" class="btn-secondary" onclick="resetForm()">초기화</button>
        </div>

      </form>

      <div id="form-alert" class="form-alert hidden"></div>

    </section>

    <!-- ============================
         뷰 3: 고객 목록
    ============================= -->
    <section id="view-list" class="view">

      <div class="filter-bar">
        <input
          type="search"
          id="search-input"
          placeholder="고객명 또는 차종 검색..."
          oninput="filterCustomers()"
        />
        <select id="filter-status" onchange="filterCustomers()">
          <option value="">전체 상태</option>
          <option value="신규문의">신규문의</option>
          <option value="상담중">상담중</option>
          <option value="계약유력">⭐ 계약유력</option>
          <option value="보류">보류</option>
          <option value="타딜러구매">타딜러구매</option>
          <option value="타브랜드구매">타브랜드구매</option>
          <option value="해약">해약</option>
          <option value="출고완료">출고완료</option>
        </select>
      </div>

      <div class="quick-filters">
        <button class="qbtn active" onclick="quickFilter('all', this)">전체</button>
        <button class="qbtn" onclick="quickFilter('계약유력', this)">⭐ 계약유력</button>
        <button class="qbtn" onclick="quickFilter('타딜러구매', this)">타딜러구매</button>
        <button class="qbtn" onclick="quickFilter('출고완료', this)">출고완료</button>
      </div>

      <div id="customer-list" class="card-grid">
        <p class="empty-msg">등록된 고객이 없습니다.</p>
      </div>

    </section>

  </main>

  <!-- ===== 고객 상세 모달 ===== -->
  <div id="detail-modal" class="modal-overlay hidden" onclick="closeModal(event)">
    <div class="modal-box">
      <button class="modal-close" onclick="closeDetailModal()">✕</button>
      <div id="modal-content"></div>
      <div class="modal-actions">
        <button class="btn-primary" onclick="editFromModal()">수정하기</button>
        <button class="btn-danger" onclick="deleteFromModal()">삭제</button>
      </div>
    </div>
  </div>

  <!-- ===== 확인 다이얼로그 ===== -->
  <div id="confirm-dialog" class="modal-overlay hidden">
    <div class="confirm-box">
      <p id="confirm-msg">정말 삭제하시겠습니까?</p>
      <div class="confirm-actions">
        <button class="btn-danger" id="confirm-ok">삭제</button>
        <button class="btn-secondary" onclick="closeConfirm()">취소</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
